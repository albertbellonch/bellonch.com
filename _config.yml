# Site settings
title: Albert Bellonch
email: albert@bellonch.com
description: > # this means to ignore newlines until "baseurl:"
baseurl: "" # the subpath of your site, e.g. /blog/
url: "http://localhost:4000" # the base hostname & protocol for your site
permalink: /:title
twitter_username: abellonch
github_username: albertbellonch

# Build settings
markdown: kramdown

# Plugins
plugins:
  - jekyll/minibundle
  - jekyll-sitemap

# Assets
minibundle:
  minifier_commands:
    js: bin/uglifyjs

# Exclude directories from processing and watching
exclude:
  - _tmp/

# Other
mode: development
